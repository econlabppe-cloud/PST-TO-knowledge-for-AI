name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps
          python -m pip install pytest pydantic beautifulsoup4 langdetect PyYAML pandas numpy tqdm scikit-learn python-docx

      - name: Run tests
        run: python -m pytest -q
